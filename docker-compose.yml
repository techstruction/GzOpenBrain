name: openbrain-team

services:
  openbrain:
    build: .
    container_name: openbrain_agent
    ports:
      - "8769:8769"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - openbrain_net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8769/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  open-claw:
    build: ./open-claw
    container_name: openbrain_openclaw
    ports:
      - "18789:18789"
    volumes:
      - ./open-claw:/root/.openclaw
    environment:
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - openbrain
    networks:
      - openbrain_net


  caddy:
    image: caddy:latest
    container_name: openbrain_proxy
    restart: unless-stopped
    ports:
      - "8818:8818"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - openbrain_net


  openbrain_memu:
    build: ./mcp-memu
    container_name: openbrain_memu
    ports:
      - "8001:8001"
    volumes:
      - .env:/app/.env
      - ./open-claw:/root/.openclaw
    restart: unless-stopped
    networks:
      - openbrain_net


networks:
  openbrain_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
